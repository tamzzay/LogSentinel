<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LogSentinel 🚀 Real-time SIEM Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
            color: white;
            height: 100vh;
            overflow: hidden;
        }

        .header {
            background: rgba(0,0,0,0.5);
            padding: 20px;
            text-align: center;
            backdrop-filter: blur(10px);
        }

        .header h1 {
            font-size: 2.2em;
            background: linear-gradient(45deg, #38bdf8, #60a5fa);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .main-container {
            display: flex;
            height: calc(100vh - 120px);
            gap: 20px;
            padding: 20px;
            overflow: hidden;
        }

        /* Stats Grid - LEFT SIDE */
        .stats-panel {
            width: 30%;
            display: flex;
            flex-direction: column;
            gap: 15px;
            max-height: 100%;
            overflow-y: auto;
        }

        .stat-card {
            background: rgba(30, 41, 59, 0.9);
            padding: 20px;
            border-radius: 15px;
            border: 1px solid rgba(56, 189, 248, 0.3);
            transition: all 0.3s ease;
            cursor: pointer;
        }

        .stat-card:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 25px rgba(56, 189, 248, 0.2);
            border-color: #38bdf8;
        }

        .stat-card.danger {
            border-color: #ef4444;
            background: rgba(239, 68, 68, 0.1);
            box-shadow: 0 0 20px rgba(239, 68, 68, 0.3);
        }

        .stat-card.warning {
            border-color: #f59e0b;
            background: rgba(245, 158, 11, 0.1);
        }

        .stat-icon {
            font-size: 1.8em;
            margin-bottom: 10px;
            opacity: 0.8;
        }

        .stat-label {
            font-size: 0.85em;
            color: #94a3b8;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 8px;
        }

        .stat-value {
            font-size: 2em;
            font-weight: bold;
            margin-bottom: 5px;
        }

        .threat-badge {
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 0.8em;
            font-weight: bold;
            text-transform: uppercase;
        }

        .threat-low { background: rgba(16, 185, 129, 0.2); color: #10b981; }
        .threat-medium { background: rgba(245, 158, 11, 0.2); color: #f59e0b; }
        .threat-high { background: rgba(239, 68, 68, 0.3); color: #ef4444; }

        /* Charts Panel - CENTER */
        .charts-panel {
            width: 40%;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .chart-wrapper {
            background: rgba(30, 41, 59, 0.9);
            padding: 20px;
            border-radius: 15px;
            border: 1px solid rgba(56, 189, 248, 0.3);
            height: 48%;
        }

        .chart-title {
            color: #38bdf8;
            margin-bottom: 15px;
            font-size: 1.1em;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        /* Right Panel */
        .right-panel {
            width: 30%;
            display: flex;
            flex-direction: column;
            gap: 20px;
            max-height: 100%;
            overflow: hidden;
        }

        .map-section, .logs-section {
            background: rgba(30, 41, 59, 0.9);
            border-radius: 15px;
            border: 1px solid rgba(56, 189, 248, 0.3);
            overflow: hidden;
        }

        .section-header {
            background: rgba(56, 189, 248, 0.1);
            padding: 15px 20px;
            border-bottom: 1px solid rgba(56, 189, 248, 0.2);
            color: #38bdf8;
            font-weight: 600;
        }

        #attackMap {
            width: 100%;
            height: 250px;
            border: none;
        }

        #logFeed {
            height: 350px;
            overflow-y: auto;
            padding: 15px;
            font-family: 'Courier New', monospace;
            font-size: 12px;
            background: rgba(15, 23, 42, 0.8);
        }

        .log-line {
            padding: 6px 0;
            border-bottom: 1px solid rgba(255,255,255,0.05);
            animation: slideIn 0.3s ease-out;
            display: flex;
            gap: 8px;
            font-size: 11px;
        }

        .log-time { color: #60a5fa; min-width: 60px; }
        .log-threat { min-width: 25px; font-weight: bold; }
        .log-content { flex: 1; color: #e2e8f0; word-break: break-all; }

        @keyframes slideIn {
            from { opacity: 0; transform: translateX(-20px); }
            to { opacity: 1; transform: translateX(0); }
        }

        /* Status Bar */
        .status-bar {
            position: fixed;
            bottom: 15px;
            right: 15px;
            background: rgba(30, 41, 59, 0.95);
            padding: 12px 20px;
            border-radius: 25px;
            border: 1px solid #38bdf8;
            font-size: 13px;
            backdrop-filter: blur(15px);
            z-index: 1000;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .status-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: #10b981;
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.6; transform: scale(1.2); }
        }

        .spinner {
            border: 2px solid rgba(56,189,248,0.3);
            border-top: 2px solid #38bdf8;
            border-radius: 50%;
            width: 14px;
            height: 14px;
            animation: spin 1s linear infinite;
        }

        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        canvas { max-height: 100% !important; }
    </style>
</head>
<body>
    <!-- Header -->
    <div class="header">
        <h1><i class="fas fa-shield-alt"></i> LogSentinel AI</h1>
        <div>Real-time Log Analysis & Threat Detection</div>
    </div>

    <!-- Main Layout -->
    <div class="main-container">
        <!-- LEFT: Stats -->
        <div class="stats-panel">
            <div class="stat-card" id="totalCard">
                <div class="stat-icon"><i class="fas fa-chart-line"></i></div>
                <div class="stat-label">Total Logs</div>
                <div class="stat-value" id="totalLogs">0</div>
            </div>

            <div class="stat-card" id="adminCard">
                <div class="stat-icon"><i class="fas fa-user-shield"></i></div>
                <div class="stat-label">Admin Hits</div>
                <div class="stat-value" id="adminHits">0</div>
            </div>

            <div class="stat-card" id="deleteCard">
                <div class="stat-icon"><i class="fas fa-trash"></i></div>
                <div class="stat-label">DELETE Requests</div>
                <div class="stat-value" id="deleteHits">0</div>
            </div>

            <div class="stat-card" id="errorCard">
                <div class="stat-icon"><i class="fas fa-bug"></i></div>
                <div class="stat-label">5xx Errors</div>
                <div class="stat-value" id="errorCount">0</div>
            </div>

            <div class="stat-card" id="confidenceCard">
                <div class="stat-icon"><i class="fas fa-brain"></i></div>
                <div class="stat-label">Confidence</div>
                <div class="stat-value" id="confidenceVal">0%</div>
            </div>
        </div>

        <!-- CENTER: Charts -->
        <div class="charts-panel">
            <div class="chart-wrapper">
                <div class="chart-title">
                    <i class="fas fa-chart-pie"></i> Status Codes
                </div>
                <canvas id="statusChart"></canvas>
            </div>
            <div class="chart-wrapper">
                <div class="chart-title">
                    <i class="fas fa-chart-line"></i> Log Rate
                </div>
                <canvas id="rateChart"></canvas>
            </div>
        </div>

        <!-- RIGHT: Map + Logs -->
        <div class="right-panel">
            <div class="map-section">
                <div class="section-header">
                    <i class="fas fa-map-marker-alt"></i> Attack Map
                </div>
                <iframe id="attackMap" src="/static/attack_map.html?t=0"></iframe>
            </div>

            <div class="logs-section">
                <div class="section-header">
                    <i class="fas fa-terminal"></i> Live Logs
                </div>
                <div id="logFeed">Waiting for logs...</div>
            </div>
        </div>
    </div>

    <!-- Status Bar -->
    <div class="status-bar" id="statusBar">
        <span class="spinner"></span> Connecting...
    </div>

    <script>
        let statusChart, rateChart;
        let logHistory = [];
        let lastDataTime = 0;

        // Initialize Charts
        function initCharts() {
            const statusCtx = document.getElementById('statusChart').getContext('2d');
            statusChart = new Chart(statusCtx, {
                type: 'doughnut',
                data: {
                    labels: ['200', '404', '500', 'Other'],
                    datasets: [{
                        data: [0, 0, 0, 0],
                        backgroundColor: ['#10b981', '#f59e0b', '#ef4444', '#64748b'],
                        borderWidth: 0
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: {
                            position: 'bottom',
                            labels: { color: 'white', padding: 20 }
                        }
                    }
                }
            });

            const rateCtx = document.getElementById('rateChart').getContext('2d');
            rateChart = new Chart(rateCtx, {
                type: 'line',
                data: {
                    labels: [],
                    datasets: [{
                        label: 'Logs/sec',
                        data: [],
                        borderColor: '#38bdf8',
                        backgroundColor: 'rgba(56,189,248,0.1)',
                        borderWidth: 3,
                        fill: true,
                        tension: 0.4
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    scales: {
                        y: {
                            beginAtZero: true,
                            ticks: { color: 'white' },
                            grid: { color: 'rgba(255,255,255,0.1)' }
                        },
                        x: { display: false }
                    },
                    plugins: { legend: { display: false } }
                }
            });
        }

        // Update ALL stats LIVE
        function updateStats(data) {
            // Update numbers (THIS WAS THE MAIN ISSUE - NOW FIXED)
            document.getElementById('totalLogs').textContent = data.total_logs || 0;
            document.getElementById('adminHits').textContent = data.admin || 0;
            document.getElementById('deleteHits').textContent = data.delete || 0;
            document.getElementById('errorCount').textContent = data.errors || 0;
            document.getElementById('confidenceVal').textContent = (data.confidence || 0) + '%';

            // Dynamic threat styling
            const cards = {
                totalCard: document.getElementById('totalCard'),
                adminCard: document.getElementById('adminCard'),
                deleteCard: document.getElementById('deleteCard'),
                errorCard: document.getElementById('errorCard'),
                confidenceCard: document.getElementById('confidenceCard')
            };

            Object.values(cards).forEach(card => {
                card.classList.remove('danger', 'warning');
            });

            if (data.threat?.includes('HIGH')) {
                cards.totalCard.classList.add('danger');
            } else if (data.threat?.includes('MEDIUM')) {
                cards.adminCard.classList.add('warning');
                cards.deleteCard.classList.add('warning');
            }

            // Update status bar
            document.getElementById('statusBar').innerHTML = `
                <span class="status-dot"></span>
                LIVE: ${new Date().toLocaleTimeString()}
            `;
        }

        // Update Status Chart
        function updateStatusChart(statusData = {}) {
            const labels = Object.keys(statusData).slice(0, 6);
            const values = Object.values(statusData).slice(0, 6);

            statusChart.data.labels = labels;
            statusChart.data.datasets[0].data = values;
            statusChart.update('none');
        }

        // Update Rate Chart
        function updateRateChart(totalLogs) {
            const now = new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit', second:'2-digit'});

            rateChart.data.labels.push(now);
            rateChart.data.datasets[0].data.push(totalLogs);

            if (rateChart.data.labels.length > 25) {
                rateChart.data.labels.shift();
                rateChart.data.datasets[0].data.shift();
            }

            rateChart.update('none');
        }

        // Update Log Feed
        function updateLogs(logs = []) {
            const logFeed = document.getElementById('logFeed');

            if (logs.length === 0) {
                logFeed.innerHTML = '<div style="text-align:center;color:#64748b;padding:40px;">No logs yet...</div>';
                return;
            }

            logFeed.innerHTML = logs.map(log => `
                <div class="log-line">
                    <span class="log-time">${log.timestamp || '00:00'}</span>
                    <span class="log-threat">${log.threat || '✅'}</span>
                    <span class="log-content">${(log.log || '').substring(0, 150)}${(log.log || '').length > 150 ? '...' : ''}</span>
                </div>
            `).join('');

            logFeed.scrollTop = logFeed.scrollHeight;
        }

        // Refresh Map
        function refreshMap() {
            document.getElementById('attackMap').src = `/static/attack_map.html?t=${Date.now()}`;
        }

        // MAIN REALTIME LOOP - FIXED TO WORK 100%
        function startRealtime() {
            let retryCount = 0;

            const fetchData = () => {
                fetch('/data')
                    .then(res => {
                        if (!res.ok) throw new Error('Network error');
                        return res.json();
                    })
                    .then(data => {
                        // UPDATE EVERYTHING
                        updateStats(data);
                        updateStatusChart(data.status_codes);
                        updateRateChart(data.total_logs);
                        updateLogs(data.recent_logs);

                        retryCount = 0; // Reset retry

                        // Refresh map every 5 seconds
                        if (Math.random() < 0.2) refreshMap();

                    })
                    .catch(err => {
                        console.error('Fetch error:', err);
                        retryCount++;
                        document.getElementById('statusBar').innerHTML =
                            `<span class="spinner"></span> Error (${retryCount})`;

                        if (retryCount < 10) {
                            setTimeout(fetchData, 2000);
                        }
                    });
            };

            // Start polling every 1.5 seconds
            fetchData();
            setInterval(fetchData, 1500);
        }

        // Initialize when page loads
        window.addEventListener('load', () => {
            initCharts();
            startRealtime();
        });

        // Handle resize
        window.addEventListener('resize', () => {
            statusChart?.resize();
            rateChart?.resize();
        });
    </script>
</body>
</html>
